<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Master Dashboard</title>
</head>
<body>
    <div id="app">
        <h1>Master Dashboard</h1>
        
        <section id="settings">
            <input type="password" id="api-key" placeholder="Enter your OpenAI API Key">
            <button onclick="saveKey()">Save Key</button>
        </section>

        <section id="tasks">
            <textarea id="prompt-input" placeholder="Paste your workflow task here..."></textarea>
            <button onclick="runAgent()">Run Automation</button>
            <div id="output"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
